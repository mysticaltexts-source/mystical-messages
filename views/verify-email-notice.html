<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6B46C1">
    <title>Verify Your Email - Mystical Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body data-page="verify-email">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="/" style="font-size: 1.5rem;">✨</a>
        </div>

        <div class="card" style="text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">📬</div>
            <h2 style="margin-bottom: 0.5rem;">Check Your Email</h2>
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.6;">
                We sent a verification link to your email address. Please click the link to activate your account before continuing.
            </p>

            <!-- Status/Error messages -->
            <div id="status-message" style="display: none; margin-bottom: 1rem;"></div>

            <div style="background: var(--bg-secondary, #f5f3ff); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.875rem; color: var(--text-secondary); line-height: 1.6;">
                <strong>📌 Didn't receive it?</strong><br>
                Check your spam folder, or click below to resend.
            </div>

            <button id="resend-btn" class="btn btn-primary btn-block" style="margin-bottom: 0.75rem;">
                Resend Verification Email
            </button>

            <a href="/auth/login" class="btn btn-secondary btn-block" style="display: block; text-align: center; padding: 0.75rem 1rem; border-radius: 50px; background: transparent; border: 1px solid var(--border-color, #e2e8f0); color: var(--text-secondary); text-decoration: none; font-size: 0.875rem;">
                Back to Login
            </a>
        </div>
    </div>

    <script>
        // Show any error messages from URL params
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        const statusEl = document.getElementById('status-message');

        if (error) {
            statusEl.style.display = 'block';
            statusEl.style.background = '#fff5f5';
            statusEl.style.border = '1px solid #fed7d7';
            statusEl.style.borderRadius = '8px';
            statusEl.style.padding = '0.75rem 1rem';
            statusEl.style.color = '#c53030';
            statusEl.style.fontSize = '0.875rem';

            const messages = {
                'missing': 'Verification link is missing or incomplete. Please request a new one.',
                'invalid': 'This verification link has expired or already been used. Please request a new one.',
                'server': 'Something went wrong. Please try again.'
            };
            statusEl.textContent = messages[error] || 'An error occurred. Please try again.';
        }

        // Resend button
        const resendBtn = document.getElementById('resend-btn');
        let cooldown = false;

        resendBtn.addEventListener('click', async () => {
            if (cooldown) return;
            cooldown = true;
            resendBtn.textContent = 'Sending...';
            resendBtn.disabled = true;

            try {
                const response = await fetch('/auth/resend-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();

                statusEl.style.display = 'block';
                if (data.success) {
                    statusEl.style.background = '#f0fff4';
                    statusEl.style.border = '1px solid #9ae6b4';
                    statusEl.style.color = '#276749';
                    statusEl.textContent = '✅ ' + data.message;
                    resendBtn.textContent = 'Email Sent!';
                } else {
                    statusEl.style.background = '#fff5f5';
                    statusEl.style.border = '1px solid #fed7d7';
                    statusEl.style.color = '#c53030';
                    statusEl.textContent = '❌ ' + (data.error || 'Failed to send. Please try again.');
                    resendBtn.textContent = 'Resend Verification Email';
                    resendBtn.disabled = false;
                    cooldown = false;
                }
                statusEl.style.borderRadius = '8px';
                statusEl.style.padding = '0.75rem 1rem';
                statusEl.style.fontSize = '0.875rem';
            } catch (err) {
                statusEl.style.display = 'block';
                statusEl.style.background = '#fff5f5';
                statusEl.style.border = '1px solid #fed7d7';
                statusEl.style.borderRadius = '8px';
                statusEl.style.padding = '0.75rem 1rem';
                statusEl.style.color = '#c53030';
                statusEl.style.fontSize = '0.875rem';
                statusEl.textContent = '❌ Network error. Please try again.';
                resendBtn.textContent = 'Resend Verification Email';
                resendBtn.disabled = false;
                cooldown = false;
            }

            // Allow resend again after 60 seconds
            setTimeout(() => {
                if (cooldown) {
                    cooldown = false;
                    resendBtn.textContent = 'Resend Verification Email';
                    resendBtn.disabled = false;
                }
            }, 60000);
        });
    </script>
</body>
</html>

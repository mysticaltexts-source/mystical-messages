<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6B46C1">
    <title>Sign Up - Mystical Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body data-page="signup">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="/" style="font-size: 1.5rem;">✨</a>
        </div>

        <!-- Signup Form -->
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 0.5rem;">Create Account</h2>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 1.5rem;">
                Start creating magical moments
            </p>

            <form id="signup-form">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-input" id="firstName" placeholder="Your first name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-input" id="phone" placeholder="(555) 123-4567" required>
                    <p class="form-helper">Messages will be sent to this number</p>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Min 8 characters" required minlength="8">
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <div id="error-message" class="form-error" style="display: none;"></div>

                <!-- Terms acceptance checkbox -->
                <div style="display: flex; align-items: flex-start; gap: 0.6rem; margin-bottom: 1rem;">
                    <input type="checkbox" id="termsAccepted" style="margin-top: 3px; width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--primary-color);" required>
                    <label for="termsAccepted" style="font-size: 0.8rem; color: var(--text-secondary); line-height: 1.4; cursor: pointer;">
                        I agree to the <a href="/terms" target="_blank" style="color: var(--primary-color);">Terms of Service</a>, <a href="/privacy" target="_blank" style="color: var(--primary-color);">Privacy Policy</a>, and <a href="/refund" target="_blank" style="color: var(--primary-color);">Refund Policy</a>. I confirm I am 18 years or older.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
                    Create Account
                </button>
            </form>

            <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 0.875rem;">
                Already have an account? <a href="/auth/login">Log in</a>
            </p>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorEl = document.getElementById('error-message');
            const submitBtn = document.getElementById('submit-btn');

            // Clear previous errors
            errorEl.style.display = 'none';

            // Validate passwords
            if (password !== confirmPassword) {
                errorEl.textContent = 'Passwords do not match';
                errorEl.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorEl.textContent = 'Password must be at least 8 characters';
                errorEl.style.display = 'block';
                return;
            }

            // Disable submit button to prevent double-submit
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            // Submit
            try {
                const response = await fetch('/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        firstName, email, phone, password, confirmPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorEl.textContent = data.error || 'An error occurred';
                    errorEl.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch (error) {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>

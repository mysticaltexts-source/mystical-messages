<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Mystical Messages</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a0533 0%, #2d1b4e 50%, #1a0533 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    text-align: center;
    padding: 2rem;
  }
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; overflow: hidden; z-index: 0;
  }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle 3s infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
  .card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    max-width: 480px;
    width: 100%;
  }
  .emoji { font-size: 5rem; margin-bottom: 1rem; display: block; }
  h1 { font-size: 5rem; font-weight: 900; color: #F687B3; line-height: 1; margin-bottom: 0.5rem; }
  h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem; color: #e9d5ff; }
  p { color: rgba(255,255,255,0.7); line-height: 1.7; margin-bottom: 2rem; }
  a.btn {
    display: inline-block;
    background: linear-gradient(135deg, #6B46C1, #F687B3);
    color: #fff;
    text-decoration: none;
    padding: 0.8rem 2.2rem;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.95rem;
    transition: opacity 0.2s;
  }
  a.btn:hover { opacity: 0.85; }
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="card">
  <span class="emoji">🔮</span>
  <h1>404</h1>
  <h2>The magic couldn't find this page</h2>
  <p>It seems this enchanted path has wandered off into the mist. The page you're looking for doesn't exist or may have been moved.</p>
  <a href="/" class="btn">Return Home ✨</a>
</div>
<script>
  const stars = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    stars.appendChild(s);
  }
</script>
</body>
</html>
